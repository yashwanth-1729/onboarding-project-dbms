# PostgreSQL — values default to local dev, overridable via env vars (e.g. on Render).
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:onboarding_db}${DB_PARAMS:}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — local uses none (schema from database/schema.sql); on a fresh cloud DB set
# SPRING_JPA_HIBERNATE_DDL_AUTO=update so Hibernate creates the tables.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Node.js service — owns the MongoDB collections (reminders, activity log).
# Spring Boot posts audit events here instead of writing to Mongo directly.
node.service.url=${NODE_SERVICE_URL:http://localhost:8082}

# Server — Render injects PORT; default to 8081 locally.
server.port=${PORT:8081}

# Disable Spring Security auto config — we handle it ourselves
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration