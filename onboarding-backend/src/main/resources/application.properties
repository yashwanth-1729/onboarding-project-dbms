# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/onboarding_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Node.js service — owns the MongoDB collections (reminders, activity log).
# Spring Boot posts audit events here instead of writing to Mongo directly.
node.service.url=http://localhost:8082

# Server
server.port=8081

# Disable Spring Security auto config — we handle it ourselves
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration