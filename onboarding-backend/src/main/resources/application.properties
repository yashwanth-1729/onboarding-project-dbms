# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/onboarding_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# MongoDB — local server (free, no signup). Install MongoDB Community Server,
# which runs as a Windows service on port 27017. The database is created
# automatically on first write.
# (For Atlas instead, override with env var SPRING_DATA_MONGODB_URI.)
spring.data.mongodb.uri=mongodb://localhost:27017/onboarding_db
spring.data.mongodb.database=onboarding_db

# Server
server.port=8081

# Disable Spring Security auto config — we handle it ourselves
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration